<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرث الدخون | Erth AlDukhoun</title>
        <link rel="icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- استدعاء خطوط جوجل المتناسبة مع الثيم -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #fcf9f5; /* لون عاجي مستوحى من خلفية اللوغو */
            --gold-primary: #b89047; /* ذهبي ملكي دافئ */
            --gold-dark: #8c6b30;
            --text-dark: #3a3226; /* بني داكن دافئ */
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding-bottom: 100px;
        }

        /* الهيدر والعنوان الرئيسي */
        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .logo-title {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: var(--gold-dark);
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo-subtitle {
            font-size: 1rem;
            color: var(--text-dark);
            opacity: 0.8;
            letter-spacing: 0.5px;
            position: relative;
            display: inline-block;
            padding-bottom: 15px;
        }

        .logo-subtitle::after {
            content: '♦';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold-primary);
            font-size: 0.8rem;
        }

        /* مستطيل البحث المطور */
        .search-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            background: var(--white);
            border: 1px solid rgba(184, 144, 71, 0.3);
            border-radius: 30px;
            padding: 5px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            align-items: center;
        }

        .search-box select {
            border: none;
            outline: none;
            background: transparent;
            padding: 10px;
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
            border-left: 1px solid #eee;
            margin-left: 10px;
        }

        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            background: transparent;
        }

        .search-box i {
            color: var(--gold-primary);
            font-size: 1.2rem;
            margin-right: 10px;
        }

        /* مربعات التصنيفات السريعة */
        .categories-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .category-box {
            background: var(--white);
            border: 1px solid rgba(184, 144, 71, 0.2);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 100px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .category-box:hover, .category-box.active {
            background: var(--gold-primary);
            color: var(--white);
            border-color: var(--gold-primary);
            transform: translateY(-2px);
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .product-card {
            background: var(--white);
            border-radius: 15px;
            border: 1px solid rgba(184, 144, 71, 0.15);
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(140, 107, 48, 0.1);
        }

        .product-img {
            width: 100%;
            height: 100%;
            background-color: #f9f6f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-primary);
            font-size: 3.5rem;
            border-bottom: 1px solid rgba(184, 144, 71, 0.1);
            position: relative;
        }
        
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .product-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0; /* تم تصفيره ليتناسب مع الهيدر الجديد */
        }

        /* زر محتويات البكج */
        .package-contents-link {
            font-size: 0.8rem;
            color: var(--gold-dark);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
            white-space: nowrap;
            padding: 2px 0;
        }
        .package-contents-link:hover {
            color: var(--gold-primary);
        }

        /* تصميم أزرار السعة الجديد */
        .size-buttons-group {
            margin-bottom: 20px;
        }

        .size-buttons-group label.section-label {
            font-size: 0.85rem;
            color: #777;
            display: block;
            margin-bottom: 8px;
        }

        .size-options-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .size-btn-label {
            cursor: pointer;
            flex-grow: 1;
        }

        .size-btn-label input {
            display: none; /* إخفاء زر الراديو التقليدي */
        }

        .size-btn-custom {
            display: block;
            padding: 8px 12px;
            background-color: var(--bg-color);
            border: 1px solid rgba(184, 144, 71, 0.2);
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .size-btn-label input:checked + .size-btn-custom {
            background-color: var(--gold-primary);
            color: var(--white);
            border-color: var(--gold-primary);
        }

        .product-bottom {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold-dark);
        }

        .add-to-cart-btn {
            background: var(--gold-primary);
            color: var(--white);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 600;
        }

        .add-to-cart-btn:hover {
            background: var(--gold-dark);
        }

        /* السلة العائمة أسفل اليسار */
        .cart-floating-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--gold-dark);
            color: var(--white);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 999;
            transition: transform 0.3s ease;
        }

        .cart-floating-btn:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #d9534f;
            color: white;
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* الشاشات العائمة (النوافذ المنبثقة) */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .cart-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-content {
            background: var(--white);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .close-cart {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }
        .close-cart:hover {
            color: #d9534f;
        }

        .cart-items-list, .contents-items-list {
            margin: 20px 0;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f5f5f5;
        }

        /* تصميم عناصر قائمة المحتويات داخل النافذة العائمة للبكج */
        .content-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-color);
            border-radius: 8px;
            border-right: 4px solid var(--gold-primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* خيارات التوصيل */
        .delivery-options {
            margin: 20px 0;
            background: var(--bg-color);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(184, 144, 71, 0.15);
        }

        .delivery-options h4 {
            margin-bottom: 10px;
            color: var(--gold-dark);
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkout-btn {
            background: #25D366; /* لون واتساب */
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .checkout-btn:hover {
            background: #20ba5a;
        }

        @media (max-width: 600px) {
            .logo-title { font-size: 2.2rem; }
            .category-box { flex-grow: 1; padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header>
        <div class="logo-title">إرث الدخون</div>
        <div class="logo-subtitle">حيث يلتقي التراث البحريني بالفخامة العصرية</div>
    </header>

    <!-- مستطيل البحث الذكي -->
    <div class="search-container">
        <div class="search-box">
            <select id="search-category" onchange="filterProducts()">
                <option value="all">كل الأقسام</option>
                <option value="packages">بكجات</option>
                <option value="unisex">الجنسين</option>
                <option value="men">رجالي</option>
                <option value="women">نسائي</option>
            </select>
            <input type="text" id="search-input" placeholder="اكتب اسم العطر للبحث..." oninput="filterProducts()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>

    <!-- صناديق التصنيفات الـ 4 + تصنيف الكل -->
    <div class="categories-container">
        <div class="category-box active" onclick="selectCategory('all', this)">الكل</div>
        <div class="category-box" onclick="selectCategory('packages', this)">بكجات</div>
        <div class="category-box" onclick="selectCategory('unisex', this)">الجنسين</div>
        <div class="category-box" onclick="selectCategory('men', this)">رجالي</div>
        <div class="category-box" onclick="selectCategory('women', this)">نسائي</div>
    </div>

    <!-- شبكة المنتجات -->
    <main class="products-grid" id="products-container">
        <!-- يتم توليد المنتجات هنا تلقائياً بواسطة جاوا سكريبت -->
    </main>

    <!-- السلة العائمة أسفل اليسار -->
    <div class="cart-floating-btn" onclick="toggleCart(true)">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-count" id="cart-count">0</span>
    </div>

    <!-- نافذة السلة والطلب المعروضة عند الضغط على السلة -->
    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <i class="fa-solid fa-xmark close-cart" onclick="toggleCart(false)"></i>
            <h3>حقيبة التسوق</h3>
            
            <div class="cart-items-list" id="cart-items-list">
                <!-- عناصر السلة تظهر هنا -->
            </div>

            <div style="display:flex; justify-content:space-between; font-weight:700; margin: 15px 0; font-size:1.2rem;">
                <span>الإجمالي:</span>
                <span id="cart-total">0 د.ب</span>
            </div>

            <!-- خيارات التوصيل للزبون -->
            <div class="delivery-options">
                <h4>طريقة الاستلام:</h4>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="delivery" value="توصيل للمنزل" checked>
                        توصيل للمنزل
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="delivery" value="استلام من المتجر">
                        الاستلام من المتجر
                    </label>
                </div>
            </div>

            <!-- زر إتمام الطلب عبر واتساب -->
            <button class="checkout-btn" onclick="sendToWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i>
                إتمام الطلب عبر الواتساب
            </button>
        </div>
    </div>

    <!-- نافذة محتويات البكج العائمة (تظهر عند الضغط على محتويات البكج) -->
    <div class="cart-modal" id="package-contents-modal">
        <div class="cart-content">
            <i class="fa-solid fa-xmark close-cart" onclick="toggleContentsModal(false)"></i>
            <h3 id="contents-modal-title" style="color: var(--gold-dark);">محتويات البكج</h3>
            <p style="font-size:0.85rem; color:#777; margin-bottom: 15px;">يتكون هذا البكج المتميز من المجموعات التالية:</p>
            
            <div class="contents-items-list" id="contents-items-list">
                <!-- عناصر ومحتويات البكج المختار تظهر هنا تلقائياً عبر JS -->
            </div>
        </div>
    </div>

    <script>

                ]

        ];

        let cart = [];
        let currentCategory = 'all';

        // عرض المنتجات في الصفحة
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            const searchInput = document.getElementById('search-input').value.toLowerCase();
            const searchCategory = document.getElementById('search-category').value;

            const filtered = products.filter(p => {
                const matchesCategory = (currentCategory === 'all' && (searchCategory === 'all' || p.category === searchCategory)) || 
                                        (currentCategory !== 'all' && p.category === currentCategory);
                const matchesSearch = p.name.toLowerCase().includes(searchInput);
                return matchesCategory && matchesSearch;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:#777; padding: 40px;">لم يتم العثور على عطور تطابق بحثك.</p>`;
                return;
            }

            filtered.forEach(p => {
                // التحقق من وجود خاصية المحتويات
                const hasContents = p.contents && p.contents.length > 0;
                
                let sizeButtonsHTML = '';
                // إذا لم يكن يحتوي على محتويات (منتج عادي)، نعرض أزرار السعة بشكل طبيعي
                if (!hasContents) {
                    let sizeButtons = '';
                    p.sizes.forEach((s, index) => {
                        const checked = index === 0 ? 'checked' : '';
                        sizeButtons += `
                            <label class="size-btn-label">
                                <input type="radio" name="size-prod-${p.id}" value="${index}" ${checked} onchange="updatePriceDisplay(${p.id}, ${s.price})">
                                <span class="size-btn-custom">${s.size}</span>
                            </label>
                        `;
                    });
                    
                    sizeButtonsHTML = `
                        <div class="size-buttons-group">
                            <label class="section-label">اختر السعة:</label>
                            <div class="size-options-wrapper">
                                ${sizeButtons}
                            </div>
                        </div>
                    `;
                }

                // رابط "محتويات البكج" يظهر فقط إذا كانت الخاصية موجودة بالمنتج
                const contentsLinkHTML = hasContents 
                    ? `<button class="package-contents-link" onclick="openContentsModal(${p.id})">محتويات البكج</button>` 
                    : '';

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img">
                        ${p.image ? `<img src="${p.image}" alt="${p.name}">` : `<i class="fa-solid ${p.icon || 'fa-bottle-flat-amber-glass'}"></i>`}
                    </div>
                    <div class="product-info">
                        <div class="product-header-wrapper">
                            <div class="product-title">${p.name}</div>
                            ${contentsLinkHTML}
                        </div>
                        ${sizeButtonsHTML}
                        <div class="product-bottom">
                            <span class="product-price" id="price-display-${p.id}">${p.sizes[0].price} د.ب</span>
                            <button class="add-to-cart-btn" onclick="addToCart(${p.id})">إضافة للسلة</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // فتح وعرض محتويات البكج المختار في النافذة العائمة
        function openContentsModal(productId) {
            const product = products.find(p => p.id === productId);
            if(!product || !product.contents) return;

            document.getElementById('contents-modal-title').innerText = `محتويات ${product.name}`;
            
            const listContainer = document.getElementById('contents-items-list');
            listContainer.innerHTML = '';

            product.contents.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'content-item-row';
                itemDiv.innerHTML = `<i class="fa-solid fa-star" style="color: var(--gold-primary); font-size: 0.8rem;"></i> <span>${item}</span>`;
                listContainer.appendChild(itemDiv);
            });

            toggleContentsModal(true);
        }

        // تبديل ظهور نافذة المحتويات
        function toggleContentsModal(show) {
            const modal = document.getElementById('package-contents-modal');
            if(show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        // تحديث السعر المعروض فور الضغط على زر السعة
        function updatePriceDisplay(productId, price) {
            const priceDisplay = document.getElementById(`price-display-${productId}`);
            priceDisplay.innerText = `${price} د.ب`;
        }

        // تصفية المنتجات حسب الأقسام
        function selectCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.category-box').forEach(box => box.classList.remove('active'));
            element.classList.add('active');
            renderProducts();
        }

        function filterProducts() {
            renderProducts();
        }

        // إضافة العطور إلى السلة بناءً على الزر المختار
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            
            // جلب الحجم المختار (إذا كان البكج مخفي السعة نأخذ الحجم الافتراضي الأول مباشرة)
            const selectedRadio = document.querySelector(`input[name="size-prod-${productId}"]:checked`);
            const selectedIndex = selectedRadio ? selectedRadio.value : 0;
            const selectedSizeInfo = product.sizes[selectedIndex];

            const existingItem = cart.find(item => item.id === productId && item.size === selectedSizeInfo.size);

            if(existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    size: selectedSizeInfo.size,
                    price: selectedSizeInfo.price,
                    qty: 1
                });
            }
            updateCartFloatingUI();
        }

        // تحديث واجهة السلة
        function updateCartFloatingUI() {
            const totalQty = cart.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cart-count').innerText = totalQty;
            
            const listContainer = document.getElementById('cart-items-list');
            listContainer.innerHTML = '';
            
            let totalCost = 0;

            if(cart.length === 0) {
                listContainer.innerHTML = '<p style="color:#aaa; text-align:center;">السلة فارغة حالياً</p>';
            } else {
                cart.forEach((item, index) => {
                    totalCost += (item.price * item.qty);
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <div>
                            <strong>${item.name}</strong> <br>
                            <small style="color:var(--gold-dark)">الحجم: ${item.size} × ${item.qty}</small>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span>${item.price * item.qty} د.ب</span>
                            <i class="fa-solid fa-trash" style="color:#d9534f; cursor:pointer;" onclick="removeFromCart(${index})"></i>
                        </div>
                    `;
                    listContainer.appendChild(div);
                });
            }
            document.getElementById('cart-total').innerText = `${totalCost} د.ب`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartFloatingUI();
        }

        function toggleCart(show) {
            const modal = document.getElementById('cart-modal');
            if(show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        // إرسال الطلب للواتساب
        function sendToWhatsApp() {
            if(cart.length === 0) {
                alert("يرجى إضافة منتجات للسلة أولاً قبل إتمام الطلب.");
                return;
            }

            const deliveryMethod = document.querySelector('input[name="delivery"]:checked').value;
            
            let message = `*طلب جديد من متجر إرث الدخون*\n`;
            message += `-----------------------------------\n\n`;
            
            cart.forEach((item, i) => {
                message += `*${i+1}- ${item.name}*\n`;
                message += `السعة: ${item.size}\n`;
                message += `الكمية: ${item.qty}\n`;
                message += `السعر: ${item.price * item.qty} د.ب\n\n`;
            });

            const totalCost = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            
            message += `-----------------------------------\n`;
            message += `*طريقة الاستلام:* ${deliveryMethod}\n`;
            message += `*الإجمالي الكلي:* ${totalCost} د.ب\n\n`;
            message += `يرجى تأكيد الطلب وتزويدي بالتفاصيل المتبقية.`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappURL = `https://wa.me/${STORE_WHATSAPP}?text=${encodedMessage}`;
            
            window.open(whatsappURL, '_blank');
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
